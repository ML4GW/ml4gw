version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      production:
        patterns:
          - "jaxtyping"
          - "torch"
          - "torchaudio"
          - "numpy"
          - "scipy"
      
      documentation:
        patterns:
          - "Sphinx*"
          - "sphinx*"
          - "myst*"
          - "torchmetrics"
          - "lightning"
          - "rich"
          - "gwpy"
          - "jupyter"

      development:
        patterns: ["*"]
        exclude-patterns:
          - "jaxtyping"
          - "torch"
          - "torchaudio"
          - "numpy"
          - "scipy"
          - "Sphinx*"
          - "sphinx*"
          - "myst*"
          - "torchmetrics"
          - "lightning"
          - "rich"
          - "gwpy"
          - "jupyter"
